name = "edgeever"
main = "apps/api/src/index.ts"
compatibility_date = "2026-06-26"
workers_dev = true

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/mcp"]

[[d1_databases]]
binding = "DB"
database_name = "edgeever"
database_id = "cb750808-8b4f-4592-a0d3-71171acd7135"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RESOURCES"
bucket_name = "edgeever-resources"
preview_bucket_name = "edgeever-resources-preview"

[observability]
enabled = true
